<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>松本香織</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory:      #faf7f2;
      --cream:      #f0e9de;
      --tan:        #c9a97a;
      --terracotta: #b5673c;
      --brown:      #6b4226;
      --text:       #3a2e26;
      --muted:      #8a7060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--ivory);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* ===== NAME ===== */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--brown);
      margin-bottom: 4px;
    }

    .name-roman {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--tan);
      margin-bottom: 28px;
    }

    /* ===== BIO ===== */
    .bio {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 2;
      text-align: left;
      margin-bottom: 36px;
    }

    /* ===== DIVIDER ===== */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--tan);
      margin: 0 auto 36px;
    }

    /* ===== SERVICE BUTTONS ===== */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: all 0.2s ease;
      border: 1.5px solid transparent;
    }

    .link-btn.primary {
      background: var(--brown);
      color: var(--ivory);
    }
    .link-btn.primary:hover {
      background: var(--terracotta);
    }

    .link-btn.secondary {
      background: transparent;
      border-color: var(--tan);
      color: var(--brown);
    }
    .link-btn.secondary:hover {
      background: var(--cream);
      border-color: var(--terracotta);
    }

    /* ===== SOCIAL LINKS ===== */
    .social {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .social a {
      font-size: 0.75rem;
      color: var(--tan);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s ease;
    }
    .social a:hover {
      color: var(--terracotta);
    }

    /* ===== FOOTER ===== */
    footer {
      margin-top: 48px;
      font-size: 0.72rem;
      color: var(--tan);
      letter-spacing: 0.1em;
      text-align: center;
    }
    footer a {
      color: var(--tan);
      text-decoration: none;
    }
    footer a:hover {
      color: var(--terracotta);
    }
  </style>
</head>
<body>

<div class="card">

  <h1 class="name">松本香織</h1>
  <p class="name-roman">kaori matsumoto</p>

  <p class="bio">
    編集者・ライター。大学卒業後、Webメディアの立ち上げ・運営に従事。<br>
    読売新聞「ヨリモ」、有料メルマガ「津田大介のメディアの現場」、<br>
    ニュースサイト「ハフポスト日本版」などを経て独立。<br>
    雑誌・Webメディアでのライター実績あり。<br>
    2020年、早稲田大学大学院ジャーナリズムコース修了。
  </p>

  <div class="divider"></div>

  <div class="links">
    <a class="link-btn primary" href="editing.html">
      編集・ライティングします
    </a>
    <a class="link-btn secondary" href="consulting.html">
      相談に乗ります
    </a>
  </div>

  <div class="social">
    <a href="https://x.com/tekitodsci" target="_blank" rel="noopener">X</a>
    <a href="https://fori.io/kmatsumoto" target="_blank" rel="noopener">ポートフォリオ</a>
  </div>

</div>

<footer>
  © 2026 松本香織 &ensp;|&ensp;
  <a href="terms.html">利用規約</a>
</footer>

</body>
</html>
